name: Publish

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. 2.0.0). Leave empty to auto-detect from commits."
        required: false
        type: string

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@latest

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            # Get version from npm
            NPM_VERSION=$(npm view imposters version --registry https://registry.npmjs.org 2>/dev/null || echo "0.0.0")

            # Get version from latest git tag
            LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
            GIT_VERSION="${LAST_TAG#v}"
            GIT_VERSION="${GIT_VERSION:-0.0.0}"

            # Use the higher version as base
            CURRENT=$(printf '%s\n%s' "$NPM_VERSION" "$GIT_VERSION" | sort -V | tail -1)
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)

            # Find commits since last tag
            if [[ -n "$LAST_TAG" ]]; then
              COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
            else
              COMMITS=$(git log --pretty=format:"%s")
            fi

            # Determine bump type from conventional commits
            BUMP="patch"
            if echo "$COMMITS" | grep -qiE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
              BUMP="minor"
            fi

            case "$BUMP" in
              major) VERSION="$((MAJOR + 1)).0.0" ;;
              minor) VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
          fi

          # Check if tag already exists
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${VERSION}"

      - name: Build library
        run: bun run build

      - name: Verify dist
        run: |
          test -f dist/package.json
          test -f dist/bin/imposters

      - name: Patch dist version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('dist/package.json', 'utf-8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('dist/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        run: npm publish dist/ --provenance --access public
        env:
          NODE_AUTH_TOKEN: ""

      - name: Create git tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        run: |
          LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | sed -n '2p')
          if [[ -n "$LAST_TAG" ]]; then
            NOTES=$(git log "${LAST_TAG}..HEAD~1" --pretty=format:"- %s" | grep -vE "^- (chore|ci|docs)(\(.+\))?:")
          else
            NOTES="Initial release"
          fi
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "${NOTES:-No notable changes}" \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
