name: Publish

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.3.0). Leave empty to auto-increment patch."
        required: false
        type: string

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@latest

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            CURRENT=$(npm view imposters version --registry https://registry.npmjs.org 2>/dev/null || echo "0.0.0")
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          # Check if tag already exists
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${VERSION}"

      - name: Build library
        run: bun run build

      - name: Verify dist
        run: |
          test -f dist/package.json
          test -f dist/bin/imposters

      - name: Patch dist version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('dist/package.json', 'utf-8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('dist/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        run: npm publish dist/ --provenance --access public
        env:
          NODE_AUTH_TOKEN: ""

      - name: Create git tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
