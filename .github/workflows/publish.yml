name: Publish

on:
  push:
    branches: [master]
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@latest

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Explicit tag: use that version
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            # Push to master: auto-increment patch from latest npm version
            CURRENT=$(npm view imposters version --registry https://registry.npmjs.org 2>/dev/null || echo "0.0.0")
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          fi
          echo "Publishing version: $(cat "$GITHUB_OUTPUT" | grep version | cut -d= -f2)"

      - name: Build library
        run: bun run build

      - name: Verify dist
        run: |
          test -f dist/package.json
          test -f dist/bin/imposters

      - name: Patch dist version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('dist/package.json', 'utf-8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('dist/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish main package
        run: npm publish dist/ --provenance --access public
        env:
          NODE_AUTH_TOKEN: ""
